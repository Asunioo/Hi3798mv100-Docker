name: Build Hi3798MV100 Kernel for Debian 12

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version (Debian 12 requires 5.10+, recommended 6.1+)'
        required: true
        default: '6.1.64'
      enable_all_features:
        description: 'Enable all Debian 12 required features'
        required: true
        default: 'true'

env:
  ARCH: arm
  CROSS_COMPILE: arm-linux-gnueabihf-
  KERNEL_VERSION: ${{ inputs.kernel_version || '6.1.64' }}
  # Debian 12 armhf官方内核源
  KERNEL_REPO: https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git
  # 或者使用Debian backports内核
  # KERNEL_REPO: https://salsa.debian.org/kernel-team/linux.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install ARM cross-compilation toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-arm-linux-gnueabihf \
          g++-arm-linux-gnueabihf \
          libc6-armhf-cross \
          libc6-dev-armhf-cross \
          binutils-arm-linux-gnueabihf \
          u-boot-tools \
          device-tree-compiler \
          bc \
          libncurses5-dev \
          libssl-dev \
          flex \
          bison \
          build-essential \
          ccache \
          rsync \
          curl \
          wget \
          git \
          kmod \
          cpio \
          python3 \
          libelf-dev \
          libdw-dev

    - name: Clone kernel source
      run: |
        git clone --depth=1 --branch v${KERNEL_VERSION} ${KERNEL_REPO} linux
        cd linux
        echo "Cloned kernel version: $(make kernelversion)"

    - name: Configure kernel for Debian 12 armhf
      run: |
        cd linux
        
        # 创建armv7基础配置
        make ARCH=$ARCH multi_v7_defconfig
        
        # 启用Debian 12必需的所有功能
        echo "=== Enabling Debian 12 required features ==="
        
        # 基础系统支持
        cat >> .config <<EOF
        
        # Debian 12 Base System Requirements
        CONFIG_MODULES=y
        CONFIG_MODULE_UNLOAD=y
        CONFIG_BLK_DEV_INITRD=y
        CONFIG_INITRAMFS_SOURCE=""
        CONFIG_RD_GZIP=y
        CONFIG_RD_BZIP2=y
        CONFIG_RD_LZMA=y
        CONFIG_RD_XZ=y
